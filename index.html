<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Studio Bella</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <img src="capa.jpg" class="capa">

    <h1>Studio Bella</h1>
    <p class="slogan">Seu salão de beleza favorito 💇‍♀️</p>

    <h2>Serviços</h2>
    <h2>Tabela de Preços</h2>

<div class="tabela">
  <div class="item">
    <span>Corte feminino</span>
    <span>R$ 60</span>
  </div>

  <div class="item">
    <span>Escova</span>
    <span>R$ 40</span>
  </div>

  <div class="item">
    <span>Manicure</span>
    <span>R$ 35</span>
  </div>

  <div class="item">
    <span>Progressiva</span>
    <span>R$ 180</span>
  </div>
</div>
    <ul>
      <li>✨ Corte feminino</li>
      <li>✨ Escova</li>
      <li>✨ Manicure</li>
      <li>✨ Progressiva</li>
    </ul>

    <div class="info">
      <p>📍 Campinas - SP</p>
      <p>🕒 Segunda a Sábado - 9h às 18h</p>
    </div>

    <h2>Agendamento</h2>

      <form onsubmit="enviarWhats(event)">
  <input type="text" id="nome" placeholder="Seu nome" required>
  <input type="tel" id="telefone" placeholder="Seu telefone" required>
  
  <select id="servico" required>
    <option value="">Escolha o serviço</option>
    <option>Corte feminino</option>
    <option>Escova</option>
    <option>Manicure</option>
    <option>Progressiva</option>
  </select>
  
  <input type="date" id="data" required>
  
  <button type="submit">Agendar</button>
    </form>

    <br>

    <a href="https://wa.me/5515991863247" target="_blank">
      <button>Agendar pelo WhatsApp</button>
    </a>

  </div>
<script>
function enviarWhats(event) {
  event.preventDefault();

  var nome = document.getElementById("nome").value;
  var telefone = document.getElementById("telefone").value;
  var servico = document.getElementById("servico").value;
  var data = document.getElementById("data").value;

  var mensagem = "Olá, meu nome é " + nome +
                 ". Quero agendar " + servico +
                 " para o dia " + data +
                 ". Meu telefone é " + telefone;

  var numero = "5515991863247"; // coloque seu número aqui

  var url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>
</body>
</html>
