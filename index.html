<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Studio Bella</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <img src="capa.jpg" class="capa">

    <h1>Studio Bella</h1>
    <p class="slogan">Seu salão de beleza favorito 💇‍♀️</p>

    <h2>Serviços</h2>
    <ul>
      <li>✨ Corte feminino</li>
      <li>✨ Escova</li>
      <li>✨ Manicure</li>
      <li>✨ Progressiva</li>
    </ul>

    <div class="info">
      <p>📍 Campinas - SP</p>
      <p>🕒 Segunda a Sábado - 9h às 18h</p>
    </div>

    <h2>Agendamento</h2>

      <form onsubmit="enviarWhats(event)">
  <input type="text" id="nome" placeholder="Seu nome" required>
  <input type="tel" id="telefone" placeholder="Seu telefone" required>
  
  <select id="servico" required>
    <option value="">Escolha o serviço</option>
    <option>Corte feminino</option>
    <option>Escova</option>
    <option>Manicure</option>
    <option>Progressiva</option>
  </select>
  
  <input type="date" id="data" required>
  
  <button type="submit">Agendar</button>
    </form>

    <br>

    <a href="https://wa.me/5511999999999" target="_blank">
      <button>Agendar pelo WhatsApp</button>
    </a>

  </div>

</body>
</html>
